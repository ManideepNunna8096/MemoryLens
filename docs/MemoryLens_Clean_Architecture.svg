<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #0b0d14; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #f4f6ff; }
      .subtitle { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #b9bfd8; }
      .box { fill: #131725; stroke: #2b2f44; stroke-width: 2; }
      .box2 { fill: #171b2c; stroke: #3a3f5b; stroke-width: 2; }
      .box3 { fill: #1c2236; stroke: #4a4f6f; stroke-width: 2; }
      .head { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .text { font: 15px "Segoe UI", Arial, sans-serif; fill: #d9ddf2; }
      .small { font: 13px "Segoe UI", Arial, sans-serif; fill: #aeb5d0; }
      .tag { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #0b0d14; }
      .arrow { stroke: #7d6cff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #4e5472; stroke-width: 2; fill: none; marker-end: url(#arrowMuted); }
      .pill { fill: #7d6cff; }
      .pill2 { fill: #3fd18c; }
      .pill3 { fill: #ffb84d; }
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171b2b"/>
      <stop offset="100%" stop-color="#0c0f17"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#7d6cff"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#4e5472"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect x="50" y="35" width="1500" height="930" rx="28" ry="28" fill="url(#glow)" stroke="#1f2435" stroke-width="2"/>
  <text x="800" y="88" text-anchor="middle" class="title">MemoryLens - Clean System Architecture</text>
  <text x="800" y="118" text-anchor="middle" class="subtitle">Frontend, Flask backend, PostgreSQL with pgvector, ML services, and file storage working together</text>

  <rect x="110" y="180" width="280" height="180" rx="22" class="box"/>
  <rect x="110" y="180" width="92" height="28" rx="14" class="pill"/>
  <text x="156" y="199" text-anchor="middle" class="tag">USER</text>
  <text x="250" y="235" text-anchor="middle" class="head">Browser / User</text>
  <text x="250" y="270" text-anchor="middle" class="text">Login, upload, search,</text>
  <text x="250" y="295" text-anchor="middle" class="text">browse timeline, manage albums</text>

  <rect x="460" y="160" width="330" height="220" rx="24" class="box2"/>
  <rect x="460" y="160" width="110" height="28" rx="14" class="pill"/>
  <text x="515" y="179" text-anchor="middle" class="tag">FRONTEND</text>
  <text x="625" y="225" text-anchor="middle" class="head">Static Web UI</text>
  <text x="625" y="260" text-anchor="middle" class="text">HTML pages</text>
  <text x="625" y="288" text-anchor="middle" class="text">CSS theme and layout</text>
  <text x="625" y="316" text-anchor="middle" class="text">JavaScript controllers</text>
  <text x="625" y="344" text-anchor="middle" class="text">`api.js` JWT + API layer</text>

  <rect x="870" y="150" width="630" height="250" rx="24" class="box3"/>
  <rect x="870" y="150" width="112" height="28" rx="14" class="pill2"/>
  <text x="926" y="169" text-anchor="middle" class="tag">BACKEND</text>
  <text x="1185" y="205" text-anchor="middle" class="head">Flask Application Layer</text>
  <text x="1185" y="240" text-anchor="middle" class="text">App factory, JWT auth, logging, migrations, rate limiting</text>
  <text x="1185" y="268" text-anchor="middle" class="text">Blueprints: auth, photos, search, events, timeline, duplicates, folders, admin</text>
  <text x="1185" y="296" text-anchor="middle" class="text">Jobs: upload processing, event organization, backup, health</text>
  <text x="1185" y="324" text-anchor="middle" class="text">Route handlers call models and service helpers</text>

  <rect x="120" y="505" width="450" height="260" rx="24" class="box2"/>
  <rect x="120" y="505" width="150" height="28" rx="14" class="pill3"/>
  <text x="195" y="524" text-anchor="middle" class="tag">ML SERVICES</text>
  <text x="345" y="560" text-anchor="middle" class="head">AI Processing Layer</text>
  <text x="345" y="595" text-anchor="middle" class="text">CLIP embeddings for semantic search</text>
  <text x="345" y="623" text-anchor="middle" class="text">ResNet-18 Places365 scene classification</text>
  <text x="345" y="651" text-anchor="middle" class="text">SHA-256 + dHash duplicate detection</text>
  <text x="345" y="679" text-anchor="middle" class="text">Scene-to-category event album mapping</text>
  <text x="345" y="707" text-anchor="middle" class="text">Lazy model loading on first use</text>

  <rect x="620" y="505" width="390" height="260" rx="24" class="box2"/>
  <rect x="620" y="505" width="138" height="28" rx="14" class="pill"/>
  <text x="689" y="524" text-anchor="middle" class="tag">DATABASE</text>
  <text x="815" y="560" text-anchor="middle" class="head">PostgreSQL + pgvector</text>
  <text x="815" y="595" text-anchor="middle" class="text">users, photos, events, jobs tables</text>
  <text x="815" y="623" text-anchor="middle" class="text">CLIP vector storage in `clip_vector_pg`</text>
  <text x="815" y="651" text-anchor="middle" class="text">Similarity search using pgvector</text>
  <text x="815" y="679" text-anchor="middle" class="text">Photo metadata, hashes, timestamps</text>
  <text x="815" y="707" text-anchor="middle" class="text">Relational integrity and ownership</text>

  <rect x="1080" y="505" width="410" height="260" rx="24" class="box2"/>
  <rect x="1080" y="505" width="118" height="28" rx="14" class="pill2"/>
  <text x="1139" y="524" text-anchor="middle" class="tag">STORAGE</text>
  <text x="1285" y="560" text-anchor="middle" class="head">File Storage</text>
  <text x="1285" y="595" text-anchor="middle" class="text">`backend/uploads/` stores image files</text>
  <text x="1285" y="623" text-anchor="middle" class="text">`backend/backups/` stores dumps and ZIPs</text>
  <text x="1285" y="651" text-anchor="middle" class="text">Files kept outside the database</text>
  <text x="1285" y="679" text-anchor="middle" class="text">Fast access and simpler export/backup</text>
  <text x="1285" y="707" text-anchor="middle" class="text">Metadata stays in PostgreSQL</text>

  <path d="M390 270 L460 270" class="arrow"/>
  <path d="M790 270 L870 270" class="arrow"/>
  <path d="M1040 400 L820 505" class="arrow"/>
  <path d="M1240 400 L1240 505" class="arrow"/>
  <path d="M810 665 L1080 665" class="muted"/>
  <path d="M625 380 L515 505" class="muted"/>
  <path d="M1185 400 L815 505" class="muted"/>

  <rect x="175" y="835" width="1250" height="80" rx="18" fill="#111523" stroke="#2a3045" stroke-width="2"/>
  <text x="800" y="868" text-anchor="middle" class="head" style="font-size:18px;">End-to-end flow</text>
  <text x="800" y="896" text-anchor="middle" class="small">User action -> Frontend request -> Flask route -> AI processing and validation -> PostgreSQL + file storage -> UI refresh</text>
</svg>
