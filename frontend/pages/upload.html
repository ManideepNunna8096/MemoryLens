<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MemoryLens — Upload</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 20px; padding: 64px 24px;
      text-align: center; cursor: pointer;
      transition: all 0.25s; background: var(--bg2);
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124,108,252,0.05);
    }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon {
      width: 60px; height: 60px; margin: 0 auto 16px;
      background: rgba(124,108,252,0.15); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .drop-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .drop-sub   { color: var(--text3); font-size: 14px; }
    .drop-sub span { color: var(--accent); font-weight: 500; }

    .preview-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px; margin-top: 24px;
    }
    .preview-item {
      position: relative; border-radius: 10px; overflow: hidden;
      aspect-ratio: 1; background: var(--bg3);
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-remove {
      position: absolute; top: 6px; right: 6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.7); color: white;
      border: none; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 4px 6px; background: rgba(0,0,0,0.7);
      font-size: 10px; color: white; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .upload-actions {
      display: flex; align-items: center; gap: 12px; margin-top: 24px;
    }
    .file-count { color: var(--text2); font-size: 14px; }

    .progress-wrap { margin-top: 24px; display: none; }
    .progress-bar-bg {
      height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px; transition: width 0.3s; width: 0%;
    }
    .progress-label { font-size: 13px; color: var(--text2); margin-top: 8px; }

    .results-wrap { margin-top: 32px; }
    .result-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
    }
    .result-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .result-info { flex: 1; }
    .result-name { font-size: 13px; font-weight: 500; }
    .result-scene { font-size: 12px; color: var(--text3); margin-top: 2px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="gallery.html">Memory<span>Lens</span></a>
    <div class="nav-links">
      <a class="nav-link" href="gallery.html">Gallery</a>
      <a class="nav-link active" href="upload.html">Upload</a>
      <a class="nav-link" href="search.html">Search</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="timeline.html">Timeline</a>
      <a class="nav-link" href="duplicates.html">Duplicates</a>
      <a class="nav-link" href="admin-health.html">Health</a>
    </div>
    <div class="nav-user">
      <span id="nav-username"></span>
      <div class="avatar" id="nav-avatar" onclick="clearToken()">U</div>
    </div>
  </nav>

  <div class="page">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Upload Photos</h1>
        <p class="page-subtitle">Drop your photos and let AI classify them automatically</p>
      </div>

      <!-- Drop Zone -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" multiple/>
        <div class="drop-icon">📷</div>
        <div class="drop-title">Drop photos here</div>
        <div class="drop-sub">or <span>browse files</span> — JPG, PNG, HEIC supported</div>
      </div>

      <!-- Preview Grid -->
      <div class="preview-grid" id="preview-grid"></div>

      <!-- Actions -->
      <div class="upload-actions" id="upload-actions" style="display:none">
        <button class="btn btn-primary btn-lg" onclick="startUpload()">
          <span id="upload-btn-text">Classify & Upload</span>
        </button>
        <button class="btn btn-ghost" onclick="clearFiles()">Clear all</button>
        <span class="file-count" id="file-count"></span>
      </div>

      <!-- Progress -->
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-label" id="progress-label">Uploading...</div>
      </div>

      <!-- Results -->
      <div class="results-wrap" id="results-wrap"></div>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="../js/api.js"></script>
  <script src="../js/upload.js"></script>
</body>
</html>
